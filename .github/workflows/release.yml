name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  STREMIO_SERVICE_VERSION: v0.1.15

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Aqu1tain/stremio-horizon
          ref: development

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install
      - run: pnpm run build

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: build/

  create-release:
    needs: build-web
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft release
        id: create
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name=${{ github.ref_name }} \
            -f name=${{ github.ref_name }} \
            -F draft=true \
            -F prerelease=true \
            --jq '.id')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    needs: [build-web, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: aarch64-apple-darwin
            service-asset: stremio-service-macos.zip
          - platform: ubuntu-22.04
            arch: x86_64-unknown-linux-gnu
            service-asset: stremio-service_amd64.deb
          - platform: windows-latest
            arch: x86_64-pc-windows-msvc
            service-asset: stremio-service-windows.zip

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - run: pnpm install

      - name: Download stremio-service
        shell: bash
        run: |
          gh release download ${{ env.STREMIO_SERVICE_VERSION }} \
            --repo Stremio/stremio-service \
            --pattern "${{ matrix.service-asset }}" \
            --dir "$RUNNER_TEMP/stremio-service"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract stremio-service (macOS)
        if: contains(matrix.platform, 'macos')
        run: |
          cd "$RUNNER_TEMP/stremio-service"
          unzip -o *.zip
          mkdir -p "${{ github.workspace }}/src-tauri/binaries"
          cp stremio-service stremio-runtime ffmpeg ffprobe server.js \
            "${{ github.workspace }}/src-tauri/binaries/"
          echo '{"type":"commonjs"}' > "${{ github.workspace }}/src-tauri/binaries/package.json"
          chmod +x "${{ github.workspace }}/src-tauri/binaries/"*

      - name: Extract stremio-service (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cd "$RUNNER_TEMP/stremio-service"
          7z x stremio-service-windows.zip -oextracted
          echo "--- Extracted contents ---"
          ls -la extracted/
          mkdir -p "${{ github.workspace }}/src-tauri/binaries"
          find extracted -maxdepth 2 -type f \( \
            -name "stremio-service.exe" -o \
            -name "stremio-runtime.exe" -o \
            -name "ffmpeg.exe" -o \
            -name "ffprobe.exe" -o \
            -name "server.js" \
          \) -exec cp {} "${{ github.workspace }}/src-tauri/binaries/" \;
          echo '{"type":"commonjs"}' > "${{ github.workspace }}/src-tauri/binaries/package.json"

      - name: Extract stremio-service (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p "$RUNNER_TEMP/stremio-service/extracted"
          dpkg-deb -x "$RUNNER_TEMP"/stremio-service/*.deb "$RUNNER_TEMP/stremio-service/extracted"
          mkdir -p src-tauri/binaries
          echo "--- .deb contents ---"
          find "$RUNNER_TEMP/stremio-service/extracted" -type f | head -30
          for f in stremio-service stremio-runtime ffmpeg ffprobe server.js; do
            find "$RUNNER_TEMP/stremio-service/extracted" -name "$f" -type f | while read src; do
              cp "$src" src-tauri/binaries/
            done
          done
          echo '{"type":"commonjs"}' > src-tauri/binaries/package.json
          chmod +x src-tauri/binaries/*
          echo "--- binaries dir ---"
          ls -la src-tauri/binaries/

      - name: Build full version
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: --target ${{ matrix.arch }}

      - name: Save full artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.exe

      - name: Prepare lite build
        shell: bash
        run: |
          rm -rf src-tauri/binaries/*
          jq '.bundle.resources = [] | .productName = "Stremio Horizon Lite"' \
            src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Build lite version
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: --target ${{ matrix.arch }}

      - name: Save lite artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lite-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.exe
