name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest stremio-horizon release
        run: |
          gh release download --repo Aqu1tain/stremio-horizon --pattern 'stremio-web.zip'
          unzip stremio-web.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: build/

  create-release:
    needs: build-web
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft release
        id: create
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name=${{ github.ref_name }} \
            -f name=${{ github.ref_name }} \
            -F draft=true \
            -F prerelease=true \
            --jq '.id')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    needs: [build-web, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            arch: aarch64-apple-darwin
            service-os: macos
            ext: ""
          - platform: ubuntu-22.04
            arch: x86_64-unknown-linux-gnu
            service-os: linux
            ext: ""
          - platform: windows-latest
            arch: x86_64-pc-windows-msvc
            service-os: windows
            ext: ".exe"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            ${{ runner.temp }}/stremio-service

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - run: pnpm install

      - name: Clone stremio-service fork
        shell: bash
        run: rm -rf "$RUNNER_TEMP/stremio-service" && git clone https://github.com/Aqu1tain/stremio-service "$RUNNER_TEMP/stremio-service"

      - name: Build stremio-service
        shell: bash
        run: |
          cd "$RUNNER_TEMP/stremio-service"
          cargo build --release --features bundled

      - name: Copy stremio-service binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp "$RUNNER_TEMP/stremio-service/target/release/stremio-service${{ matrix.ext }}" src-tauri/binaries/
          cp "$RUNNER_TEMP/stremio-service/resources/bin/${{ matrix.service-os }}"/* src-tauri/binaries/
          echo '{"type":"commonjs"}' > src-tauri/binaries/package.json
          chmod +x src-tauri/binaries/* 2>/dev/null || true
          ls -la src-tauri/binaries/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: --target ${{ matrix.arch }}

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.arch }}/release/bundle/**/*.exe
